<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="'Yu Gothic UI','Yu Gothic','Meiryo','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ea4aaa"/>
      <stop offset="1" stop-color="#a371f7"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="8" fill="url(#accent)"/>

  <text x="64" y="92" fill="#ffffff" font-size="48" font-weight="800">なぜ AI Coding Hub？</text>
  <text x="64" y="138" fill="#c9d1d9" font-size="26" font-weight="600">自分のPC・自分の契約・自分のAI — スマホから。</text>

  <line x1="640" y1="176" x2="640" y2="600" stroke="#30363d" stroke-width="2"/>

  <text x="64"  y="214" fill="#8b949e" font-size="27" font-weight="700">☁️  クラウド型AIコーディング</text>
  <text x="672" y="214" fill="#7ee787" font-size="27" font-weight="800">🏠  AI Coding Hub</text>

  <g font-size="25">
    <text x="64"  y="288" fill="#8b949e">✗  提供元のクラウドで動く</text>
    <text x="672" y="288" fill="#e6edf3" font-weight="600">✓  自分のPCで動く（実ファイルに届く）</text>

    <text x="64"  y="352" fill="#8b949e">✗  API従量・計算課金</text>
    <text x="672" y="352" fill="#e6edf3" font-weight="600">✓  自分のプランで $0 API課金</text>

    <text x="64"  y="416" fill="#8b949e">✗  ベンダー固定</text>
    <text x="672" y="416" fill="#e6edf3" font-weight="600">✓  Claude・Codex・Gemini・Antigravity</text>

    <text x="64"  y="480" fill="#8b949e">✗  コードが先方サーバに乗る</text>
    <text x="672" y="480" fill="#e6edf3" font-weight="600">✓  自分のマシンから出ない</text>

    <text x="64"  y="544" fill="#8b949e">✗  クローズド</text>
    <text x="672" y="544" fill="#e6edf3" font-weight="600">✓  MIT・フォークして改造自由</text>
  </g>

  <text x="1216" y="606" fill="#a371f7" font-size="26" font-weight="700" text-anchor="end">github.com/baadee55/ai-coding-hub</text>
</svg>
